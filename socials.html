<html>
    <head>
        <style>
            * {
                box-sizing: border-box;
                padding: 0%;
                margin: 0%;
            }
            body {
                display: flex;
                min-height: 100vh;
            }
            .nav {
                background-color: #03253c;
                width: 250px;
                padding: 20px;
                flex-shrink: 0;
                display: flex;
                flex-direction: column;
                gap: 20px;
            }

            .nav a {
                color: #ffffff;
                text-decoration: none;
                font: 1em sans-serif;
            }
            .content {
                flex: 1;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                padding: 50px;
                gap: 50px;

                background-image: url("Background.jpg");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
            }
            .box{
                width: 20vw;
                height: 25vw;   
                min-width: 100px; 
                max-width: 400px;
                min-height: 100px;
                max-height: 400px;
                display: flex;
                justify-content: start;
                align-items: start;
                box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
                overflow: hidden;
             }
            .box img{
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            .item{
                display: flex;
                align-items: start;  
                gap: 15px;
            }
             img {
                display: block;
            }
            .text p{
                color: #ffffff;
                font: 1.2em sans-serif;
                font-size: xx-large;
                line-height: 1.5;
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            }
            .description p{
                color: #353535;
                font: 1.2em sans-serif;
                line-height: 1.5;
            }
            .button {
                background-color: #4CAF50; 
                border: none; 
                color: white; 
                padding: 15px 32px; 
                text-align: center; 
                text-decoration: none;
                display: inline-block;
                font-size: 16px;
                cursor: pointer; 
                border-radius: 25px;
            }
            .button2 {
                background-color: #3e3e3e; 
                border: none; 
                color: white; 
                padding: 15px 32px; 
                text-align: center; 
                text-decoration: none;
                display: inline-block;
                font-size: 16px;
                cursor: pointer; 
                border-radius: 25px;
            }

            .button:hover {
                background-color: #54ff5d; 
            }
        </style>
    </head>
