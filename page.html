<html>
    <head>
        <style>
            * {
                box-sizing: border-box;
                padding: 0%;
                margin: 0%;
            }
            body {
                display: flex;
                min-height: 100vh;
            }
           .nav {
                background-color: #03253c;
                width: 250px;
                padding: 80px 20px 20px;
                flex-shrink: 0;
                display: flex;
                flex-direction: column;
                gap: 20px;
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 999;
            }
            .nav a {
                color: #ffffff;
                text-decoration: none;
                font: 1em sans-serif;
            }
           .content {
                flex: 1;
                min-height: 100vh;
                display: flex;
                flex-direction: column;
                padding: 50px;
                gap: 50px;
                padding-top: 80px;
                padding-left: 80px;
            
                background-image: url("Background.jpg");
                background-size: cover;
                background-position: center;
                background-repeat: no-repeat;
                background-repeat: no-repeat;
                transition: margin-left 0.3s ease;
            }

            .content.shift {
                margin-left: 250px;
            }
            .row{
                display: flex;
                gap: 3vw;
                align-items: center;
                justify-content: flex-start;
                flex-wrap: wrap;
            }
            .box, .circle {
                width: 15vw;
                height: 15vw;
                max-width: 200px;
                max-height: 200px;
                min-width: 100px;
                min-height: 100px;
                display: flex;
                justify-content: center;
                align-items: center;
                box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
                overflow: hidden;
            }
            .circle {
                border-radius: 50%;
            }
            .box img, .circle img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }
            .item, .items {
                display: flex;
                flex-direction: column-reverse;
                align-items: center;  
                gap: 15px;
            }
            .item p, .items p {
                font: 1.5em sans-serif;
                color:hotpink;
                font-size: 1.3vw;
                background-color: rgba(255, 105, 180, 0.2);
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            }
            .items p {
                color: burlywood;
                background-color: rgba(222, 184, 135, 0.2);
                text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            }
            img {
                display: block;
            }
            .menu-btn {
                display: block;
                position: fixed;
                top: 15px;
                left: 15px;
                background-color: #03253c;
                color: white;
                border: none;
                padding: 10px 14px;
                font-size: 24px;
                cursor: pointer;
                border-radius: 8px;
                z-index: 1000;
            }
            .nav.show {
                transform: translateX(0);
                }
        @media (max-width: 768px) {
            body {
                flex-direction: row;
                }
            .nav.show {
                transform: translateX(0);
                }
            .nav {
                position: fixed;
                top: 0;
                left: 0;
                height: 100%;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                }
            .menu-btn {
               display: block;
                }
            }
        </style>
    </head>
    <body>
        <button class="menu-btn" onclick="toggleMenu()">☰</button>

        <div class ="nav" id="menu">
            <a href = "page.html">Home</a>
            <a href = "about.html">About</a>
            <a href = "socials.html">Socials</a>
        </div>
        <div class="content">
            <div class="row">
                <div class="item"><p>Jang chae-rin</p><div class="box"><img src="1.jpg"></div></div>
                <div class="item"><p>"Joy"</p><div class="box"><img src="2.jpg"></div></div>
                <div class="item"><p>장채린</p><div class="box"><img src="3.jpg"></div></div>
            </div>
            <div class="row">
                <div class="items"><p>Seo Ye-eun</p><div class="circle"><img src="1.1.jpg"></div></div>
                <div class="items"><p>"Esther"</p><div class="circle"><img src="1.2.jpg"></div></div>
                <div class="items"><p>서예은</p><div class="circle"><img src="1.3.jpg"></div></div>
            </div>
        
            <script>
            function toggleMenu() {
                document.getElementById("menu").classList.toggle("show");
                        document.querySelector(".content").classList.toggle("shift");
            }
            document.querySelectorAll(".nav a").forEach(link => {
                link.addEventListener("click", () => {
                    document.getElementById("menu").classList.remove("show");
                });
            });
            </script>
        </div>
    </body>
</html>
